version: '3.8'

services:
  microwarp:
    image: ghcr.io/ccbkkb/microwarp:latest
    container_name: microwarp
    restart: always
    ports:
      - "127.0.0.1:1080:1080"
      # - "127.0.0.1:9090:9090"  # 管理 API 端口 (需配合 API_PORT 使用)
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - SYS_ADMIN    # IP 池化模式 (POOL_SIZE>1) 需要此权限创建网络命名空间
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    # environment:
    #   - BIND_ADDR=0.0.0.0           # SOCKS5 监听地址，默认 0.0.0.0
    #   - BIND_PORT=1080              # SOCKS5 监听端口，默认 1080
    #   - SOCKS_USER=admin            # SOCKS5 认证用户名，留空则为无密码模式
    #   - SOCKS_PASS=123456           # SOCKS5 认证密码，需与 SOCKS_USER 同时设置
    #   - ENDPOINT_IP=162.159.192.1:4500  # 自定义 WARP 节点 IP，用于绕过 HK/US 机房的 CF reserved 字节阻断
    #   # GH_PROXY 已废弃: wgcf 二进制现在构建时固化到镜像中
    #   - TAILSCALE_CIDR=100.64.0.0/10     # Tailscale 回程路由 CIDR，默认 100.64.0.0/10，非 Tailscale 场景无需设置
    #   - MICROWARP_TEST_MODE=0       # 测试模式，设为 1 时跳过所有初始化逻辑，用于 CI/调试
    #   ## ===== IP 轮换功能 =====
    #   - POOL_SIZE=1                 # IP 池大小，默认 1 (单实例兼容模式)，>1 启用池化隔离
    #   - API_PORT=9090               # 管理 API 端口，留空不启用
    #   - WARP_LICENSE=               # 手动指定 WARP+ License Key (最高优先级)
    #   - WARP_KEY_API=https://warp-tool.vercel.app/api/lite  # 自动获取 WARP+ Key 的 API
    volumes:
      - warp-data:/etc/wireguard

volumes:
  warp-data:
